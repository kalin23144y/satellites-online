services:
  deploy:
    build:
      context: .
      dockerfile: ./libs/database/Dockerfile
    container_name: satellites-deploy-${APP_TYPE:-dev}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/db?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  db:
    image: postgres:17-alpine
    container_name: satellites-postgres-${APP_TYPE:-dev}
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-db}
    # ports:
    #   - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/01-create-admin-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: satellites-redis-${APP_TYPE:-dev}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: satellites-rabbitmq-${APP_TYPE:-dev}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: satellites-minio-${APP_TYPE:-dev}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    restart: unless-stopped

  client:
    container_name: satellites-client-${APP_TYPE:-dev}
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/db?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_ISSUER=${JWT_ISSUER}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_URL=http://minio:9000
      - MINIO_USE_SSL=false
      - MINIO_FORCE_PATH_STYLE=false
    ports:
      - "${APP_CLIENT_PORT:-3001}:3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.my-app.rule=Host(`back.thecreatorq.ru`)"
      - "traefik.http.routers.my-app.entrypoints=websecure"
      - "traefik.http.routers.my-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.my-app.tls=true"
    networks:
      - app-network
      - webnet
    restart: unless-stopped

  worker:
    container_name: satellites-worker-${APP_TYPE:-dev}
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/db?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_URL=http://minio:9000
      - MINIO_USE_SSL=false
      - MINIO_FORCE_PATH_STYLE=false
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
  webnet:
    external:
      name: traefic_webnet

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
